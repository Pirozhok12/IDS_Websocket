<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="/style.css">
    <!-- <script src="../js/gameManager.js"></script> -->
</head>
<body>
    

    <button onclick="createGame()" id="newGame">Create new game</button>
    <div>Runing games:</div>
    <div id="rooms"></div>

</body>


<script src="/socket.io/socket.io.js"></script>
<script src="https://code.jquery.com/jquery-1.11.1.js"></script>

<script>

    

const GamesList = [];

var socket = io();





window.onload = () =>{
    const savedGames = JSON.parse(localStorage.getItem("Rooms")) || [];
    GamesList.push(...savedGames);
    savedGames.forEach(gameId => {
        loadWorkingRooms(gameId);
    });
}

function createGame() {
    const gameId = generateId();
    window.open(`/html/room.html?id=${gameId}`, '_blank');
    GamesList.push(gameId)
    localStorage.setItem("Rooms", JSON.stringify(GamesList));
    loadWorkingRooms(gameId)

}

socket.on('createdRoom', (gameId) => {
    if (!GamesList.includes(gameId)) {
        GamesList.push(gameId);
        localStorage.setItem("Rooms", JSON.stringify(GamesList));
        loadWorkingRooms(gameId);
    }
});

socket.on('deleteRoom',(roomId) => {
    
    const index = GamesList.indexOf(roomId);
    if (index !== -1) {
        GamesList.splice(index, 1);
    }

    localStorage.setItem("Rooms", JSON.stringify(GamesList));

    const el = document.getElementById(roomId);
    if (el) el.remove();

})

function generateId() {
    return Math.random().toString(36).substring(2, 10);
}

function loadWorkingRooms(newItem){
    const button = document.createElement('button');
    button.textContent = newItem;
    button.id = newItem;

    button.onclick = () => {
        window.open(`/html/room.html?id=${newItem}`, '_blank');
    };

    document.getElementById('rooms').appendChild(button);
}





</script>

</html>
